#
# Marlin Firmware
# Test: BTT_BTT002/config-01.ini
#
# BigTreeTech BTT002 Default Configuration plus TMC steppers
#

[config:base]
motherboard                              = BOARD_BTT_BTT002_V1_0
serial_port                              = 1
x_driver_type                            = TMC2209
y_driver_type                            = TMC2130
z_driver_type                            = TMC2240
x_current_home                           = (X_CURRENT - 100)
y_current_home                           = (Y_CURRENT - 100)
sensorless_homing                        = on
x_stall_sensitivity                      = on
y_stall_sensitivity                      = on
spi_endstops                             = on
