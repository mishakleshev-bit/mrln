#
# Marlin Firmware
# Test: BTT_GTR_V1_0/config-01.ini
#
# BigTreeTech GTR | 8 Extruders | Autofan | Mixed TMC | BLTouch | Distinct Runout Sensors
#

[config:base]
motherboard                              = BOARD_BTT_GTR_V1_0
serial_port                              = -1
extruders                                = 8
temp_sensor_0                            = -18
temp_sensor_1                            = 1
temp_sensor_2                            = 1
temp_sensor_3                            = 1
temp_sensor_4                            = 1
temp_sensor_5                            = 1
temp_sensor_6                            = 1
temp_sensor_7                            = 1
temp_0_mosi_pin                          = PG15
e0_auto_fan_pin                          = PC10
e1_auto_fan_pin                          = PC11
e2_auto_fan_pin                          = PC12
neopixel_pin                             = PF13
x_driver_type                            = TMC2208
y_driver_type                            = TMC2130
num_runout_sensors                       = 8
fil_runout_pin                           = 3
fil_runout2_pin                          = 4
fil_runout3_pin                          = 5
fil_runout4_pin                          = 6
fil_runout5_pin                          = 7
fil_runout6_pin                          = 8
fil_runout7_pin                          = 9
fil_runout8_pin                          = 10
fil_runout4_state                        = HIGH
fil_runout8_state                        = HIGH
filament_runout_script                   = "M600 T%%c"
reprap_discount_full_graphic_smart_controller = on
bltouch                                  = on
neopixel_led                             = on
z_safe_homing                            = on
nozzle_park_feature                      = on
advanced_pause_feature                   = on
filament_runout_sensor                   = on
fil_runout4_pullup                       = on
fil_runout8_pullup                       = on
filament_change_resume_on_insert         = on
pause_reheat_fast_resume                 = on
lcd_bed_tramming                         = on
bed_tramming_use_probe                   = on
configure_filament_change                = off
