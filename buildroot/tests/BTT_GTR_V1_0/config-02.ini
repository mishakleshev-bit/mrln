#
# Marlin Firmware
# Test: BTT_GTR_V1_0/config-02.ini
#
# BigTreeTech GTR | 6 Extruders | Quad Z + Endstops
#

[config:base]
motherboard                              = BOARD_BTT_GTR_V1_0
serial_port                              = -1
extruders                                = 5
temp_sensor_1                            = 1
temp_sensor_2                            = 1
temp_sensor_3                            = 1
temp_sensor_4                            = 1
z_driver_type                            = A4988
z2_driver_type                           = A4988
z3_driver_type                           = A4988
z4_driver_type                           = A4988
default_kp_list                          = { 22.2, 20.0, 21.0, 19.0, 18.0 }
default_ki_list                          = { 1.08 }
default_kd_list                          = { 114.0, 112.0, 110.0, 108.0 }
z3_stop_pin                              = PI7
z4_stop_pin                              = PF6
toolchange_filament_swap                 = on
toolchange_migration_feature             = on
toolchange_fs_slow_first_prime           = on
toolchange_fs_prime_first_used           = on
reprap_discount_smart_controller         = on
pid_params_per_hotend                    = on
z_multi_endstops                         = on
tc_gcode_use_global_x                    = on
tc_gcode_use_global_y                    = on
