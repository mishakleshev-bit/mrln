#
# Marlin Firmware
# Test: BTT_GTR_V1_0/config-03.ini
#
# BigTreeTech GTR | MPC | Switching Toolhead | Tool Sensors
#

[config:base]
motherboard                              = BOARD_BTT_GTR_V1_0
serial_port                              = -1
extruders                                = 3
temp_sensor_1                            = 1
temp_sensor_2                            = 1
servo1_pin                               = PE9
servo2_pin                               = PE11
servo_delay                              = { 300, 300, 300 }
switching_toolhead_x_pos                 = { 215, 0, 0 }
mpc_heater_power                         = { 40.0f, 40.0f, 40.0f }
mpc_block_heat_capacity                  = { 16.7f, 16.7f, 16.7f }
mpc_sensor_responsiveness                = { 0.22f, 0.22f, 0.22f }
mpc_ambient_xfer_coeff                   = { 0.068f, 0.068f, 0.068f }
mpc_ambient_xfer_coeff_fan255            = { 0.097f, 0.097f, 0.097f }
filament_heat_capacity_permm             = { 5.6e-3f, 3.6e-3f, 5.6e-3f }
reprap_discount_full_graphic_smart_controller = on
switching_toolhead                       = on
tool_sensor                              = on
mpctemp                                  = on
mpc_edit_menu                            = on
mpc_autotune                             = on
mpc_autotune_menu                        = on
pidtemp                                  = off
