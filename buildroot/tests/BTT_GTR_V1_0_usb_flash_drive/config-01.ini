#
# Marlin Firmware
# Test: BTT_GTR_V1_0_usb_flash_drive/config-01.ini
#
# GTT GTR | OTG USB Flash Drive | 8 Extruders | Auto-Fan | Mixed TMC Drivers | Runout Sensors (distinct)
#

[config:base]
motherboard                              = BOARD_BTT_GTR_V1_0
serial_port                              = 3
extruders                                = 8
temp_sensor_1                            = 1
temp_sensor_2                            = 1
temp_sensor_3                            = 1
temp_sensor_4                            = 1
temp_sensor_5                            = 1
temp_sensor_6                            = 1
temp_sensor_7                            = 1
sdsupport                                = on
usb_flash_drive_support                  = on
use_otg_usb_host                         = on
reprap_discount_full_graphic_smart_controller = on
bltouch                                  = on
lcd_bed_tramming                         = on
bed_tramming_use_probe                   = on
neopixel_led                             = on
z_safe_homing                            = on
filament_runout_sensor                   = on
nozzle_park_feature                      = on
advanced_pause_feature                   = on
e0_auto_fan_pin                          = PC10
e1_auto_fan_pin                          = PC11
e2_auto_fan_pin                          = PC12
neopixel_pin                             = PF13
x_driver_type                            = TMC2208
y_driver_type                            = TMC2130
fil_runout_pin                           = 3
fil_runout2_pin                          = 4
fil_runout3_pin                          = 5
fil_runout4_pin                          = 6
fil_runout5_pin                          = 7
fil_runout6_pin                          = 8
fil_runout7_pin                          = 9
fil_runout8_pin                          = 10
fil_runout4_state                        = HIGH
fil_runout8_state                        = HIGH
fil_runout4_pullup                       = on
fil_runout8_pullup                       = on
