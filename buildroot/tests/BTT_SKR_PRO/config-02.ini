#
# Marlin Firmware
# Test: BTT_SKR_PRO/config-02.ini
#
# BigTreeTech SKR Pro | 3 Extruders | Auto-Fan | BLTOUCH | Mixed TMC
#

[config:base]
motherboard                              = BOARD_BTT_SKR_PRO_V1_1
serial_port                              = -1
extruders                                = 3
temp_sensor_1                            = 1
temp_sensor_2                            = 1
e0_auto_fan_pin                          = PC10
e1_auto_fan_pin                          = PC11
e2_auto_fan_pin                          = PC12
x_driver_type                            = TMC2209
y_driver_type                            = TMC2130
bltouch                                  = on
eeprom_settings                          = on
auto_bed_leveling_3point                 = on
z_safe_homing                            = on
pins_debugging                           = on
