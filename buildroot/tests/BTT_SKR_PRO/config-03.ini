#
# Marlin Firmware
# Test: BTT_SKR_PRO/config-03.ini
#
# BigTreeTech SKR Pro | HD44780 | Laser (Percent) | Cooling | LCD
#

[config:base]
motherboard                              = BOARD_BTT_SKR_PRO_V1_1
serial_port                              = -1
cutter_power_unit                        = PERCENT
spindle_laser_pwm_pin                    = HEATER_1_PIN
spindle_laser_ena_pin                    = HEATER_2_PIN
temp_sensor_cooler                       = 1000
temp_cooler_pin                          = PD13
laser_feature                            = on
laser_safety_timeout_ms                  = on
reprap_discount_smart_controller         = on
