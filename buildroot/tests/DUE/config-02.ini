#
# Marlin Firmware
# Test: DUE/config-02.ini
#
# RADDS with ABL (Bilinear), Triple Z Axis, Z_STEPPER_AUTO_ALIGN, E_DUAL_STEPPER_DRIVERS
#

[config:base]
motherboard                              = BOARD_RADDS
z_driver_type                            = A4988
z2_driver_type                           = A4988
z3_driver_type                           = A4988
x_max_pin                                = -1
y_max_pin                                = -1
endstoppullups                           = on
bltouch                                  = on
auto_bed_leveling_bilinear               = on
i2c_scanner                              = on
z_stepper_auto_align                     = on
z_stepper_align_stepper_xy               = on
z_safe_homing                            = on
