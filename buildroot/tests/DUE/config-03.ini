#
# Marlin Firmware
# Test: DUE/config-03.ini
#
# RAMPS4DUE_EEF with SWITCHING_EXTRUDER, CANCEL_OBJECTS, POWER_LOSS_RECOVERY
#

[config:base]
motherboard                              = BOARD_RAMPS4DUE_EEF
lcd_language                             = fi
extruders                                = 2
temp_sensor_bed                          = 0
num_servos                               = 1
switching_extruder                       = on
ultimakercontroller                      = on
beep_on_feedrate_change                  = on
cancel_objects                           = on
power_loss_recovery                      = on
