#
# Marlin Firmware
# Test: I3DBEEZ9_V1/config-02.ini
#
# I3DBEE Z9 Board | 3 Extruders | Auto-Fan | Mixed TMC | FT Motion | BLTOUCH
#

[config:base]
motherboard                              = BOARD_I3DBEEZ9_V1
serial_port                              = -1
extruders                                = 3
temp_sensor_1                            = 1
temp_sensor_2                            = 1
e0_auto_fan_pin                          = PC10
e1_auto_fan_pin                          = PC11
e2_auto_fan_pin                          = PC12
x_driver_type                            = TMC2209
y_driver_type                            = TMC2130
ft_motion                                = on
ftm_smoothing                            = on
ftm_constant_jolt                        = on
ftm_trajectory_type                      = CONSTANT_JOLT
ftm_home_and_probe                       = on
resonance_test                           = on
ft_motion_menu                           = on
reprap_discount_smart_controller         = on
emergency_parser                         = on
eeprom_settings                          = on
bltouch                                  = on
auto_bed_leveling_3point                 = on
z_safe_homing                            = on
pins_debugging                           = on
ftm_shaper_zvddd                         = off
ftm_shaper_mzv                           = off
