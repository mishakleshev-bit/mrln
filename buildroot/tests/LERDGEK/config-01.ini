#
# Marlin Firmware
# Test: LERDGEK/config-01.ini
#
# LERDGE K with Generic FSMC TFT with ColorUI
#

[config:base]
motherboard                              = BOARD_LERDGE_K
serial_port                              = 1
pid_openloop                             = on
tft_generic                              = on
tft_interface_fsmc                       = on
tft_color_ui                             = on
compact_marlin_boot_logo                 = on
