#
# Marlin Firmware
# Test: LPC1768/config-01.ini
#
# ReARM EFB VIKI2, SDSUPPORT, 2 Serial ports (USB CDC + UART0), NeoPixel
#

[config:base]
motherboard                              = BOARD_RAMPS_14_RE_ARM_EFB
serial_port_3                            = 3
neopixel_type                            = NEO_RGB
rgb_led_r_pin                            = P2_12
rgb_led_g_pin                            = P1_23
rgb_led_b_pin                            = P1_22
rgb_led_w_pin                            = P1_24
fysetc_mini_12864_2_1                    = on
sdsupport                                = on
sdcard_readonly                          = on
serial_port_2                            = on
rgbw_led                                 = on
e_dual_stepper_drivers                   = on
neopixel_led                             = on
neopixel_is_sequential                   = on
neopixel_startup_test                    = on
neopixel_bkgd_index_first                = on
neopixel_bkgd_index_last                 = on
neopixel_bkgd_color                      = on
neopixel_bkgd_timeout_color              = on
neopixel_bkgd_always_on                  = on
pins_debugging                           = on
