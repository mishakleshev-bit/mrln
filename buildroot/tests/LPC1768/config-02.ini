#
# Marlin Firmware
# Test: LPC1768/config-02.ini
#
# MKS SBASE with SWITCHING_NOZZLE, FT Motion, Grbl Realtime Report
#

[config:base]
motherboard                              = BOARD_MKS_SBASE
extruders                                = 2
temp_sensor_1                            = 1
num_servos                               = 2
servo_delay                              = { 300, 300 }
switching_nozzle_servo_angles            = { { 0, 90 }, { 90, 0 } }
distinct_e_factors                       = on
switching_nozzle                         = on
switching_nozzle_e1_servo_nr             = on
switching_nozzle_lift_to_probe           = on
editable_servo_angles                    = on
servo_detach_gcode                       = on
ultimakercontroller                      = on
realtime_reporting_commands              = on
full_report_to_host_feature              = on
ft_motion                                = on
ftm_smoothing                            = on
ftm_home_and_probe                       = on
