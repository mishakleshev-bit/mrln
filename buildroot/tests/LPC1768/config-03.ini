#
# Marlin Firmware
# Test: LPC1768/config-03.ini
#
# Re-ARM with NOZZLE_AS_PROBE and many features.
#

[config:base]
motherboard                              = BOARD_RAMPS_14_RE_ARM_EEB
extruders                                = 2
temp_sensor_1                            = -4
temp_sensor_bed                          = 5
grid_max_points_x                        = 16
nozzle_to_probe_offset                   = { 0, 0, 0 }
nozzle_clean_min_temp                    = 170
nozzle_clean_start_point                 = { { 10, 10, 3 }, { 10, 10, 3 } }
nozzle_clean_end_point                   = { { 10, 20, 3 }, { 10, 20, 3 } }
reprap_discount_full_graphic_smart_controller = on
adaptive_fan_slowing                     = on
temp_tuning_maintain_fan                 = on
filament_width_sensor                    = on
filament_lcd_display                     = on
pid_extrusion_scaling                    = on
sound_menu_item                          = on
nozzle_as_probe                          = on
auto_bed_leveling_bilinear               = on
preheat_before_leveling                  = on
g29_retry_and_recover                    = on
z_min_probe_repeatability_test           = on
debug_leveling_feature                   = on
assisted_tramming                        = on
assisted_tramming_wizard                 = on
report_tramming_mm                       = on
assisted_tramming_wait_position          = on
babystepping                             = on
babystep_xy                              = on
babystep_zprobe_offset                   = on
ep_babystepping                          = on
babystep_gfx_overlay                     = on
printcounter                             = on
nozzle_park_feature                      = on
nozzle_clean_feature                     = on
slow_pwm_heaters                         = on
pidtempbed                               = on
eeprom_settings                          = on
inch_mode_support                        = on
temperature_units_support                = on
z_safe_homing                            = on
advanced_pause_feature                   = on
park_head_on_pause                       = on
host_keepalive_feature                   = on
host_action_commands                     = on
host_prompt_support                      = on
host_status_notifications                = on
lcd_info_menu                            = on
arc_support                              = on
bezier_curve_support                     = on
extended_capabilities_report             = on
auto_report_temperatures                 = on
sdsupport                                = on
sdcard_sort_alpha                        = on
auto_report_sd_status                    = on
emergency_parser                         = on
soft_reset_on_kill                       = on
soft_reset_via_serial                    = on
