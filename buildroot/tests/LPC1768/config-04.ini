#
# Marlin Firmware
# Test: LPC1768/config-04.ini
#
# SKR v1.3 with 2*Extr, bed, chamber all PID.
#

[config:base]
motherboard                              = BOARD_BTT_SKR_V1_3
extruders                                = 2
temp_sensor_0                            = 1
temp_sensor_1                            = 1
temp_sensor_bed                          = 1
temp_sensor_chamber                      = 1
temp_chamber_pin                         = P1_30
heater_chamber_pin                       = P0_28
pidtempbed                               = on
pidtempchamber                           = on
pid_extrusion_scaling                    = on
pid_fan_scaling                          = on
