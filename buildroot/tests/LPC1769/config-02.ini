#
# Marlin Firmware
# Test: LPC1769/config-02.ini
#
# Smoothieboard with TFTGLCD_PANEL_SPI and many features
#

[config:base]
motherboard                              = BOARD_SMOOTHIEBOARD
extruders                                = 2
temp_sensor_0                            = -5
temp_sensor_1                            = -4
temp_sensor_bed                          = 5
temp_0_cs_pin                            = P1_29
mag_mounted_probe_servo_nr               = 0
grid_max_points_x                        = 16
nozzle_clean_start_point                 = { { 10, 10, 3 }, { 10, 10, 3 } }
nozzle_clean_end_point                   = { { 10, 20, 3 }, { 10, 20, 3 } }
sdsort_gcode                             = true
sdsort_uses_ram                          = true
sdsort_cache_names                       = true
sdsort_dynamic_ram                       = true
tftglcd_panel_spi                        = on
sdsupport                                = on
sdcard_sort_alpha                        = on
adaptive_fan_slowing                     = on
report_adaptive_fan_slowing              = on
temp_tuning_maintain_fan                 = on
max31865_sensor_ohms_0                   = on
max31865_calibration_ohms_0              = on
mag_mounted_probe                        = on
auto_bed_leveling_bilinear               = on
g29_retry_and_recover                    = on
z_min_probe_repeatability_test           = on
debug_leveling_feature                   = on
babystepping                             = on
babystep_xy                              = on
babystep_zprobe_offset                   = on
bed_tramming_use_probe                   = on
bed_tramming_verify_raised               = on
printcounter                             = on
nozzle_park_feature                      = on
nozzle_clean_feature                     = on
slow_pwm_heaters                         = on
pidtempbed                               = on
eeprom_settings                          = on
inch_mode_support                        = on
temperature_units_support                = on
z_safe_homing                            = on
advanced_pause_feature                   = on
park_head_on_pause                       = on
lcd_info_menu                            = on
arc_support                              = on
bezier_curve_support                     = on
extended_capabilities_report             = on
auto_report_temperatures                 = on
emergency_parser                         = on
