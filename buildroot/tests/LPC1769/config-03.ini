#
# Marlin Firmware
# Test: LPC1769/config-03.ini
#
# Cohesion3D Remix DELTA | ABL Bilinear | EEPROM | Sensorless Homing/Probing | I Axis
#

[config:base]
ini_use_config                           = example/delta/generic

motherboard                              = BOARD_COHESION3D_REMIX
temp_sensor_0                            = 1
x_driver_type                            = TMC2130
y_driver_type                            = TMC2130
z_driver_type                            = TMC2130
i_driver_type                            = TB6560
default_axis_steps_per_unit              = { 80, 80, 400, 500, 80 }
default_max_feedrate                     = { 187, 187, 5, 25, 187 }
default_max_acceleration                 = { 3000, 3000, 100, 10000, 3000 }
manual_feedrate                          = { 50*60, 50*60, 4*60, 2*60, 50*60 }
axis_relative_modes                      = { false, false, false, false, false }
homing_feedrate_mm_m                     = { (50*60), (50*60), (4*60), (50*60) }
homing_bump_mm                           = { 0, 0, 0, 0 }
homing_bump_divisor                      = { 1, 1, 1, 1 }
nozzle_to_probe_offset                   = { 0, 0, 0, 0 }
i_min_pin                                = P1_25
x_current_home                           = 750
y_current_home                           = 750
z_current_home                           = 750
eeprom_settings                          = on
eeprom_chitchat                          = on
mechanical_gantry_calibration            = on
tmc_use_sw_spi                           = on
monitor_driver_status                    = on
stealthchop_xy                           = on
stealthchop_z                            = on
hybrid_threshold                         = on
sensorless_homing                        = on
z_safe_homing                            = on
x_stall_sensitivity                      = on
y_stall_sensitivity                      = on
z_stall_sensitivity                      = on
tmc_debug                                = on
auto_bed_leveling_bilinear               = on
sensorless_probing                       = on
probing_use_current_home                 = on
axis4_rotates                            = on
i_min_pos                                = on
i_max_pos                                = on
i_home_dir                               = on
i_enable_on                              = on
invert_i_dir                             = on
experimental_i2cbus                      = on
psu_control                              = off
z_min_probe_uses_z_min_endstop_pin       = off
