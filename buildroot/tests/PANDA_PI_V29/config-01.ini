#
# Marlin Firmware
# Test: PANDA_PI_V29/config-01.ini
#
# Panda Pi V29 | BD Sensor | ABL-B
#

[config:base]
motherboard                              = BOARD_PANDA_PI_V29
serial_port                              = -1
z_clearance_deploy_probe                 = 0
z_clearance_between_probes               = 1
z_clearance_multi_probe                  = 1
bd_sensor                                = on
auto_bed_leveling_bilinear               = on
z_safe_homing                            = on
babystepping                             = on
