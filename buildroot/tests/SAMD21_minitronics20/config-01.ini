#
# Marlin Firmware
# Test: SAMD21_minitronics20/config-01.ini
#
# Minitronics 2.0 with assorted features
#

[config:base]
motherboard                              = BOARD_MINITRONICS20
serial_port                              = -1
temp_sensor_0                            = 11
temp_sensor_bed                          = 11
x_driver_type                            = DRV8825
y_driver_type                            = DRV8825
z_driver_type                            = DRV8825
e0_driver_type                           = DRV8825
restore_leveling_after_g28               = false
lcd_language                             = it
sdcard_connection                        = LCD
homing_bump_mm                           = { 0, 0, 0 }
endstop_interrupts_feature               = on
bltouch                                  = on
z_min_probe_repeatability_test           = on
filament_runout_sensor                   = on
g26_mesh_validation                      = on
mesh_edit_gfx_overlay                    = on
z_safe_homing                            = on
eeprom_settings                          = on
nozzle_park_feature                      = on
sdsupport                                = on
sd_check_and_retry                       = on
reprapworld_graphical_lcd                = on
adaptive_step_smoothing                  = on
lcd_info_menu                            = on
status_message_scrolling                 = on
set_progress_manually                    = on
show_remaining_time                      = on
set_remaining_time                       = on
long_filename_host_support               = on
custom_firmware_upload                   = on
m20_timestamp_support                    = on
configurable_machine_name                = on
gcode_quoted_strings                     = on
scroll_long_filenames                    = on
babystepping                             = on
doubleclick_for_z_babystepping           = on
move_z_when_idle                         = on
babystep_zprobe_offset                   = on
babystep_gfx_overlay                     = on
lin_advance                              = on
advanced_pause_feature                   = on
park_head_on_pause                       = on
monitor_driver_status                    = on
