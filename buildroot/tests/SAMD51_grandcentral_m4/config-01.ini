[config:base]
motherboard                              = BOARD_AGCM4_RAMPS_144
serial_port                              = -1
temp_sensor_0                            = 11
temp_sensor_bed                          = 11
x_driver_type                            = TMC2209
y_driver_type                            = TMC2209
z_driver_type                            = TMC2209
z2_driver_type                           = TMC2209
e0_driver_type                           = TMC2209
restore_leveling_after_g28               = false
lcd_language                             = it
sdcard_connection                        = LCD
homing_bump_mm                           = { 0, 0, 0 }
endstop_interrupts_feature               = on
s_curve_acceleration                     = on
bltouch                                  = on
z_min_probe_repeatability_test           = on
filament_runout_sensor                   = on
g26_mesh_validation                      = on
mesh_edit_gfx_overlay                    = on
z_safe_homing                            = on
eeprom_settings                          = on
nozzle_park_feature                      = on
sdsupport                                = on
sd_check_and_retry                       = on
reprap_discount_full_graphic_smart_controller = on
z_stepper_auto_align                     = on
adaptive_step_smoothing                  = on
status_message_scrolling                 = on
set_progress_manually                    = on
show_remaining_time                      = on
