long_filename_host_support               = on
custom_firmware_upload                   = on
m20_timestamp_support                    = on
scroll_long_filenames                    = on
babystepping                             = on
doubleclick_for_z_babystepping           = on
move_z_when_idle                         = on
babystep_zprobe_offset                   = on
babystep_gfx_overlay                     = on
lin_advance                              = on
advanced_pause_feature                   = on
park_head_on_pause                       = on
monitor_driver_status                    = on
sensorless_homing                        = on
x_stall_sensitivity                      = on
y_stall_sensitivity                      = on
z_stall_sensitivity                      = on
z2_stall_sensitivity                     = on
edge_stepping                            = on
tmc_debug                                = on
pins_debugging                           = on
