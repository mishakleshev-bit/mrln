#
# Marlin Firmware
# Test: STM32F103RC_btt/config-01.ini
#
# BigTreeTech SKR Mini E3 1.0 - TMC2208 HW Serial, FT_MOTION w/out FTM_POLYS
#

[config:base]
motherboard                              = BOARD_BTT_SKR_MINI_E3_V1_0
serial_port                              = 1
serial_port_2                            = -1
x_driver_type                            = TMC2208
y_driver_type                            = TMC2208
z_driver_type                            = TMC2208
e0_driver_type                           = TMC2208
x_current_home                           = X_CURRENT/2
y_current_home                           = Y_CURRENT/2
z_current_home                           = Y_CURRENT/2
cr10_stockdisplay                        = on
emergency_parser                         = on
z_idle_height                            = on
editable_homing_current                  = on
input_shaping_x                          = on
input_shaping_y                          = on
ft_motion                                = on
ft_motion_menu                           = on
resonance_test                           = on
biqu_microprobe_v1                       = on
probe_enable_disable                     = on
z_safe_homing                            = on
auto_bed_leveling_bilinear               = on
adaptive_step_smoothing                  = on
lin_advance                              = on
smooth_lin_advance                       = on
nonlinear_extrusion                      = on
pins_debugging                           = on
ftm_polys                                = off
