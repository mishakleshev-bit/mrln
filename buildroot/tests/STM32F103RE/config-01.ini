#
# Marlin Firmware
# Test: STM32F103RE/config-01.ini
#
# STM32F1R EEPROM_SETTINGS EEPROM_CHITCHAT SDSUPPORT PAREN_COMMENTS GCODE_MOTION_MODES
#

[config:base]
motherboard                              = BOARD_STM32F103RE
serial_port                              = -1
extruders                                = 2
nozzle_clean_start_point                 = { { 10, 10, 3 } }
nozzle_clean_end_point                   = { { 10, 20, 3 } }
eeprom_settings                          = on
eeprom_chitchat                          = on
sdsupport                                = on
configuration_embedding                  = on
paren_comments                           = on
gcode_motion_modes                       = on
singlenozzle                             = on
toolchange_filament_swap                 = on
toolchange_park                          = on
baud_rate_gcode                          = on
gcode_macros                             = on
nozzle_park_feature                      = on
nozzle_clean_feature                     = on
reprap_discount_full_graphic_smart_controller = on
show_remaining_time                      = on
remaining_time_prime                     = on
remaining_time_autoprime                 = on
