#
# Marlin Firmware
# Test: STM32F103RE_btt/config-01.ini
#
# BTT SKR E3 DIP 1.0 | Mixed TMC Drivers | Differential Extruder
#

[config:base]
motherboard                              = BOARD_BTT_SKR_E3_DIP
serial_port                              = 1
serial_port_2                            = -1
x_driver_type                            = TMC2209
y_driver_type                            = TMC2130
serial_dma                               = on
ulti_controller                          = on
differential_extruder                    = on
balanced_differential_extruder           = on
