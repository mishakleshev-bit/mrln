#
# Marlin Firmware
# Test: STM32F103RE_btt_USB/config-02.ini
#
# BigTreeTech SKR CR6 PROBE_ACTIVATION_SWITCH, Probe Tare
#

[config:base]
motherboard                              = BOARD_BTT_SKR_CR6
serial_port                              = -1
serial_port_2                            = 2
temp_sensor_bed                          = 1
button1_pin                              = PA12
cr10_stockdisplay                        = on
sdsupport                                = on
emergency_parser                         = on
fan_soft_pwm                             = on
nozzle_as_probe                          = on
z_min_probe_uses_z_min_endstop_pin       = on
z_safe_homing                            = on
probe_activation_switch                  = on
probe_tare                               = on
probe_tare_only_while_inactive           = on
probing_heaters_off                      = on
preheat_before_probing                   = on
custom_user_buttons                      = on
button1_immediate                        = on
custom_menu_main                         = on
main_menu_item_1_confirm                 = on
main_menu_item_2_immediate               = on
main_menu_item_3_desc                    = on
main_menu_item_3_gcode                   = on
custom_menu_config                       = on
config_menu_item_1_confirm               = on
config_menu_item_2_immediate             = on
config_menu_item_3_desc                  = on
config_menu_item_3_gcode                 = on
nozzle_to_probe_offset                   = off
