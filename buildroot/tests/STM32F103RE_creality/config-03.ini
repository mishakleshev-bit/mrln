#
# Marlin Firmware
# Test: STM32F103RE_creality/config-03.ini
#
# Ender-3 V2 - MarlinUI (Games, UBL+BLTOUCH, MPCTEMP, LCD_ENDSTOP_TEST)
#

[config:base]
ini_use_config                           = example/Creality/Ender-3 V2/CrealityV422/CrealityUI

dwin_creality_lcd                        = off
pidtemp                                  = off
dwin_marlinui_landscape                  = on
lcd_endstop_test                         = on
auto_bed_leveling_ubl                    = on
bltouch                                  = on
z_safe_homing                            = on
mpctemp                                  = on
mpc_autotune                             = on
event_gcode_after_mpc_tune               = on
marlin_brickout                          = on
marlin_invaders                          = on
marlin_snake                             = on
games_easter_egg                         = on
