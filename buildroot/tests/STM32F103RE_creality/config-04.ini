#
# Marlin Firmware
# Test: STM32F103RE_creality/config-04.ini
#
# Ender-3 S1 - ProUI (UBL, PIDTEMP)
#

[config:base]
ini_use_config                           = example/Creality/Ender-3 S1/STM32F1

dwin_creality_lcd                        = off
auto_bed_leveling_bilinear               = off
cancel_objects                           = off
fwretract                                = off
event_gcode_sd_abort                     = off
reinit_noisy_lcd                         = off
dwin_lcd_proui                           = on
pid_autotune_menu                        = on
pid_edit_menu                            = on
status_message_scrolling                 = on
printcounter                             = on
auto_bed_leveling_ubl                    = on
lcd_bed_tramming                         = on
lin_advance                              = on
limited_max_fr_editing                   = on
limited_jerk_editing                     = on
baud_rate_gcode                          = on
case_light_enable                        = on
case_light_no_brightness                 = on
case_light_menu                          = on
nonlinear_extrusion                      = on
bootscreen_timeout                       = 1100
case_light_pin                           = 4
sdsort_gcode                             = true
