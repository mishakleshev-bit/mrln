#
# Marlin Firmware
# Test: STM32F103RE_creality/config-05.ini
#
# Creality V4.5.2 PROBE_ACTIVATION_SWITCH, Probe Tare
#

[config:base]
motherboard                              = BOARD_CREALITY_V452
serial_port                              = 1
nozzle_to_probe_offset                   = off
nozzle_as_probe                          = on
z_safe_homing                            = on
z_min_probe_uses_z_min_endstop_pin       = on
fan_soft_pwm                             = on
probe_activation_switch                  = on
probe_tare                               = on
probe_tare_only_while_inactive           = on
