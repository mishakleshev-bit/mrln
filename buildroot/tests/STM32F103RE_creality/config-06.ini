#
# Marlin Firmware
# Test: STM32F103RE_creality/config-06.ini
#
# Creality V4.2.2 with IA_CREALITY
#

[config:base]
motherboard                              = BOARD_CREALITY_V422
serial_port                              = 1
dgus_lcd_ui                              = IA_CREALITY
nozzle_park_feature                      = on
advanced_pause_feature                   = on
lcd_bed_tramming                         = on
classic_jerk                             = on
babystepping                             = on
auto_bed_leveling_bilinear               = on
probe_manually                           = on
fan_soft_pwm                             = on
no_creality_422_driver_warning           = on
no_auto_assign_warning                   = on
