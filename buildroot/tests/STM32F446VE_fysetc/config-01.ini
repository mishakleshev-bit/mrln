#
# Marlin Firmware
# Test: STM32F446VE_fysetc/config-01.ini
#
# FYSETC S6 Example
#

[config:base]
motherboard                              = BOARD_FYSETC_S6_V2_0
serial_port                              = -1
baudrate                                 = 115200
temp_sensor_bed                          = 0
default_axis_steps_per_unit              = { 80, 80, 400, 400 }
y_driver_type                            = TMC2209
z_driver_type                            = TMC2130
meatpack_on_serial_port_1                = on
eeprom_settings                          = on
sdsupport                                = on
