#
# Marlin Firmware
# Test: STM32F446VE_fysetc/config-02.ini
#
# FYSETC S6 2 with LCD FYSETC TFT81050
#

[config:base]
motherboard                              = BOARD_FYSETC_S6_V2_0
serial_port                              = 1
x_driver_type                            = TMC2130
touch_ui_ftdi_eve                        = on
lcd_fysetc_tft81050                      = on
s6_tft_pinmap                            = on
lcd_language_2                           = on
sdsupport                                = on
custom_menu_main                         = on
fix_mounted_probe                        = on
auto_bed_leveling_ubl                    = on
z_safe_homing                            = on
eeprom_settings                          = on
printcounter                             = on
calibration_gcode                        = on
lin_advance                              = on
filament_runout_sensor                   = on
advanced_pause_feature                   = on
nozzle_park_feature                      = on
