lcd_bed_leveling                         = on
mesh_edit_menu                           = on
z_safe_homing                            = on
eeprom_settings                          = on
eeprom_auto_init                         = on
nozzle_park_feature                      = on
sdsupport                                = on
speaker                                  = on
cr10_stockdisplay                        = on
quick_home                               = on
bltouch_force_sw_mode                    = on
z_stepper_auto_align                     = on
input_shaping_x                          = on
input_shaping_y                          = on
shaping_menu                             = on
adaptive_step_smoothing                  = on
lcd_info_menu                            = on
