#
# Marlin Firmware
# Test: esp32/config-01.ini
#
# ESP32 with WIFISUPPORT and WEBSUPPORT and OTASUPPORT
#

[config:base]
motherboard                              = BOARD_ESPRESSIF_ESP32
tx_buffer_size                           = 64
wifi_ssid                                = "ssid"
wifi_pwd                                 = "password"
wifisupport                              = on
websupport                               = on
otasupport                               = on
gcode_macros                             = on
baud_rate_gcode                          = on
m115_geometry_report                     = on
repetier_gcode_m360                      = on
