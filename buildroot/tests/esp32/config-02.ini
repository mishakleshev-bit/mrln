#
# Marlin Firmware
# Test: esp32/config-02.ini
#
# ESP32, TMC HW Serial, Hotend Idle
#

[config:base]
motherboard                              = BOARD_ESPRESSIF_ESP32
x_driver_type                            = TMC2209
y_driver_type                            = TMC2208
z_driver_type                            = TMC2209
e0_driver_type                           = TMC2209
x_hardware_serial                        = Serial1
y_hardware_serial                        = Serial1
z_hardware_serial                        = Serial1
e0_hardware_serial                       = Serial1
x_slave_address                          = 0
y_slave_address                          = 1
z_slave_address                          = 2
e0_slave_address                         = 3
hotend_idle_timeout                      = on
software_driver_enable                   = on
