#
# Marlin Firmware
# Test: mega1280/config-01.ini
#
# Spindle, MESH_BED_LEVELING, closed loop, Power Monitor, and LCD
#

[config:base]
lcd_language                             = an
power_monitor_current_pin                = 14
power_monitor_voltage_pin                = 15
closed_loop_enable_pin                   = 44
closed_loop_move_complete_pin            = 45
spindle_feature                          = on
default_acceleration_spindle             = on
ultimakercontroller                      = on
lcd_bed_leveling                         = on
editable_homing_feedrate                 = on
eeprom_settings                          = on
eeprom_boot_silent                       = on
eeprom_auto_init                         = on
sensorless_backoff_mm                    = on
homing_backoff_post_mm                   = on
home_y_before_x                          = on
codependent_xy_homing                    = on
mesh_bed_leveling                        = on
enable_leveling_fade_height              = on
mesh_g28_rest_origin                     = on
g26_mesh_validation                      = on
mesh_edit_menu                           = on
gcode_quoted_strings                     = on
external_closed_loop_controller          = on
power_monitor_current                    = on
power_monitor_voltage                    = on
