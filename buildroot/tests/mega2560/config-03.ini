gcode_macros                             = on
custom_menu_main                         = on
multi_nozzle_duplication                 = on
classic_jerk                             = on
lin_advance                              = on
quick_home                               = on
nanodlp_z_sync                           = on
i2c_position_encoders                    = on
m114_detail                              = on
