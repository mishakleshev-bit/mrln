#
# Marlin Firmware
# Test: mega2560/config-04.ini
#
# Azteeg X3 Pro | EXTRUDERS 4 | VIKI2 | Servo Probe | Multiple runout sensors (x4)
#

[config:base]
motherboard                              = BOARD_AZTEEG_X3_PRO
num_servos                               = 1
extruders                                = 4
temp_sensor_1                            = 1
temp_sensor_2                            = 1
temp_sensor_3                            = 1
temp_sensor_4                            = 1
fan_kickstart_time                       = 500
num_runout_sensors                       = 4
fil_runout2_pin                          = 44
fil_runout3_pin                          = 45
fil_runout4_pin                          = 46
fil_runout3_state                        = HIGH
filament_runout_script                   = "M600 T%%c"
viki2                                    = on
boot_marlin_logo_animated                = on
sdsupport                                = on
auto_report_sd_status                    = on
z_probe_servo_nr                         = on
z_servo_angles                           = on
z_servo_measure_angle                    = on
deactivate_servos_after_move             = on
z_servo_deactivate_after_stow            = on
auto_bed_leveling_3point                 = on
debug_leveling_feature                   = on
probe_pt_1                               = on
probe_pt_2                               = on
probe_pt_3                               = on
probe_wakeup_time_ms                     = on
eeprom_settings                          = on
eeprom_chitchat                          = on
m114_detail                              = on
auto_report_position                     = on
no_volumetrics                           = on
extended_capabilities_report             = on
auto_report_temperatures                 = on
autotemp                                 = on
g38_probe_target                         = on
joystick                                 = on
direct_stepping                          = on
detect_broken_endstop                    = on
filament_runout_sensor                   = on
nozzle_park_feature                      = on
advanced_pause_feature                   = on
z_safe_homing                            = on
fil_runout3_pullup                       = on
