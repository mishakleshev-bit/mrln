#
# Marlin Firmware
# Test: mega2560/config-07.ini
#
# Azteeg X3 | Mixing Extruder (x5) | Gradient Mix | Input Shaping | Russian
#

[config:base]
motherboard                              = BOARD_AZTEEG_X3_PRO
mixing_steppers                          = 5
lcd_language                             = ru
num_runout_sensors                       = E_STEPPERS
temp_sensor_bed                          = 0
redundant_part_cooling_fan               = 1
fil_runout2_pin                          = 16
fil_runout3_pin                          = 17
fil_runout4_pin                          = 4
fil_runout5_pin                          = 5
mixing_extruder                          = on
gradient_mix                             = on
gradient_vtool                           = on
cr10_stockdisplay                        = on
use_controller_fan                       = on
controller_fan_editable                  = on
controller_fan_ignore_z                  = on
xy_after_homing                          = on
event_gcode_after_homing                 = on
filament_runout_sensor                   = on
advanced_pause_feature                   = on
nozzle_park_feature                      = on
input_shaping_x                          = on
input_shaping_y                          = on
input_shaping_z                          = on
disable_other_extruders                  = off
