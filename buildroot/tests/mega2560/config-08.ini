#
# Marlin Firmware
# Test: mega2560/config-08.ini
#
# MEGA2560 RAMPS | 128x64 | progress rotation
#

[config:base]
motherboard                              = BOARD_RAMPS_14_EFB
reprap_discount_full_graphic_smart_controller = on
set_progress_manually                    = on
set_progress_percent                     = on
set_remaining_time                       = on
set_interaction_time                     = on
m73_report                               = on
show_progress_percent                    = on
show_elapsed_time                        = on
show_remaining_time                      = on
show_interaction_time                    = on
print_progress_show_decimals             = on
