monitor_driver_status                    = on
stealthchop_xy                           = on
stealthchop_z                            = on
stealthchop_e                            = on
hybrid_threshold                         = on
sensorless_homing                        = on
x_stall_sensitivity                      = on
y_stall_sensitivity                      = on
tmc_debug                                = on
m114_detail                              = on
auto_report_position                     = on
