#
# Marlin Firmware
# Test: mks_robin_nano_v1v2_maple/config-03.ini
#
# MKS Robin v2 nano LVGL SPI w/ WiFi
#

[config:base]
ini_use_config                           = example/Mks/Robin

motherboard                              = BOARD_MKS_ROBIN_NANO_V2
tft_interface_fsmc                       = off
tft_color_ui                             = off
touch_screen                             = off
tft_res_320x240                          = off
serial_port_2                            = off
tft_interface_spi                        = on
tft_lvgl_ui                              = on
tft_res_480x320                          = on
mks_wifi_module                          = on
mks_test                                 = on
