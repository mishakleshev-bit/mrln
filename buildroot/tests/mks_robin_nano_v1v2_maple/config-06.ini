#
# Marlin Firmware
# Test: mks_robin_nano_v1v2_maple/config-06.ini
#
# MKS Robin v2 nano New Color UI 480x320 SPI without TOUCH_SCREEN
#

[config:base]
ini_use_config                           = example/Mks/Robin

motherboard                              = BOARD_MKS_ROBIN_NANO_V2
tft_interface_fsmc                       = off
tft_res_320x240                          = off
touch_screen                             = off
tft_interface_spi                        = on
tft_res_480x320                          = on
tft_color_ui                             = on
