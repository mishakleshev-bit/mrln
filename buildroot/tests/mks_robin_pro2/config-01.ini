#
# Marlin Firmware
# Test: mks_robin_pro2/config-01.ini
#
# MKS Robin Pro v2 | TFT_LVGL_UI | SD/FD Multi-Volume
#

[config:base]
motherboard                              = BOARD_MKS_ROBIN_PRO_V2
serial_port                              = 1
sdsupport                                = on
usb_flash_drive_support                  = on
use_otg_usb_host                         = on
multi_volume                             = on
tft_generic                              = on
tft_interface_spi                        = on
tft_res_480x320                          = on
tft_lvgl_ui                              = on
touch_screen                             = on
bltouch                                  = on
z_safe_homing                            = on
lcd_bed_tramming                         = on
bed_tramming_use_probe                   = on
