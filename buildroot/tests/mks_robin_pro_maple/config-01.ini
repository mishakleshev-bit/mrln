#
# Marlin Firmware
# Test: mks_robin_pro_maple/config-01.ini
#
# MKS Robin Pro, TMC Drivers, no thermal protection
#

[config:base]
ini_use_config                           = example/Mks/Robin_Pro

emergency_parser                         = on
serial_port                              = 3
sdcard_connection                        = LCD
x_driver_type                            = TMC2209
y_driver_type                            = TMC2130
temp_sensor_bed                          = 1
serial_port_2                            = off
thermal_protection_hotends               = off
