#
# Marlin Firmware
# Test: mks_tinybee/config-02.ini
#
# MKS TinyBee with NeoPixel LCD, SD and Speaker
#

[config:base]
motherboard                              = BOARD_MKS_TINYBEE
lcd_language                             = en
lcd_info_screen_style                    = 0
display_charset_hd44780                  = WESTERN
neopixel_type                            = NEO_RGB
fysetc_mini_12864_2_1                    = on
sdsupport                                = on
one_click_print                          = on
no_sd_autostart                          = on
neopixel_led                             = on
led_control_menu                         = on
led_user_preset_startup                  = on
led_color_presets                        = on
