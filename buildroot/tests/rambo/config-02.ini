#
# Marlin Firmware
# Test: rambo/config-02.ini
#
# Rambo CNC Configuration
#

[config:base]
motherboard                              = BOARD_RAMBO
extruders                                = 0
temp_sensor_0                            = 999
dummy_thermistor_999_value               = 170
z_home_dir                               = 1
digipot_motor_current                    = { 120, 120, 120, 120, 120 }
default_axis_steps_per_unit              = { 80, 80, 400 }
default_max_feedrate                     = { 300, 300, 5 }
default_max_acceleration                 = { 3000, 3000, 100 }
manual_feedrate                          = { 50*60, 50*60, 4*60 }
axis_relative_modes                      = { false, false, false }
bed_tramming_leveling_order              = { LF, RF }
x2_driver_type                           = A4988
y2_driver_type                           = A4988
z_clearance_for_homing                   = 0
reprap_discount_full_graphic_smart_controller = on
reverse_encoder_direction                = on
sdsupport                                = on
eeprom_settings                          = on
s_curve_acceleration                     = on
x_dual_endstops                          = on
y_dual_endstops                          = on
adaptive_step_smoothing                  = on
cnc_coordinate_systems                   = on
gcode_motion_modes                       = on
lcd_info_menu                            = on
lcd_bed_tramming                         = on
bed_tramming_include_center              = on
min_software_endstop_z                   = off
max_software_endstops                    = off
