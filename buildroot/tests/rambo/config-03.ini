#
# Marlin Firmware
# Test: rambo/config-03.ini
#
# Rambo with ZERO EXTRUDERS, heated bed, FT_MOTION
#

[config:base]
motherboard                              = BOARD_RAMBO
extruders                                = 0
temp_sensor_bed                          = 1
temp_sensor_probe                        = 1
temp_probe_pin                           = 12
default_axis_steps_per_unit              = { 80, 80, 400 }
default_max_feedrate                     = { 300, 300, 5 }
default_max_acceleration                 = { 3000, 3000, 100 }
manual_feedrate                          = { 50*60, 50*60, 4*60 }
axis_relative_modes                      = { false, false, false }
reprap_discount_full_graphic_smart_controller = on
fix_mounted_probe                        = on
z_safe_homing                            = on
ft_motion                                = on
ftm_smoothing                            = on
ftm_home_and_probe                       = on
no_standard_motion                       = on
ftm_shaper_ei                            = off
ftm_shaper_2hei                          = off
ftm_shaper_3hei                          = off
