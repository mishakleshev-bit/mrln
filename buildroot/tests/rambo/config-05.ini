#
# Marlin Firmware
# Test: rambo/config-05.ini
#
# Rambo with PRUSA_MMU3
#

[config:base]
motherboard                              = BOARD_RAMBO
extruders                                = 5
mmu_model                                = PRUSA_MMU3
reprap_discount_full_graphic_smart_controller = on
filament_runout_sensor                   = on
nozzle_park_feature                      = on
advanced_pause_feature                   = on
emergency_parser                         = on
mmu_menus                                = on
mmu_debug                                = on
eeprom_settings                          = on
