[config:base]
motherboard                              = BOARD_MINIRAMBO
controllerfan_speed_idle                 = 128
pwm_motor_current                        = { 1300, 1300, 1250 }
i2c_slave_address                        = 63
eeprom_settings                          = on
eeprom_chitchat                          = on
reprap_discount_full_graphic_smart_controller = on
sdsupport                                = on
pca9632                                  = on
sound_menu_item                          = on
gcode_repeat_markers                     = on
auto_bed_leveling_linear                 = on
probe_manually                           = on
lcd_bed_leveling                         = on
lin_advance                              = on
advance_k_extra                          = on
inch_mode_support                        = on
temperature_units_support                = on
experimental_i2cbus                      = on
m100_free_memory_watcher                 = on
nozzle_park_feature                      = on
nozzle_clean_feature                     = on
advanced_pause_feature                   = on
park_head_on_pause                       = on
advanced_pause_continuous_purge          = on
filament_load_unload_gcodes              = on
printcounter                             = on
service_name_1                           = on
service_interval_1                       = on
m114_detail                              = on
auto_report_position                     = on
nozzle_clean_pattern_circle              = off
m100_free_memory_dumper                  = on
m100_free_memory_corruptor               = on
