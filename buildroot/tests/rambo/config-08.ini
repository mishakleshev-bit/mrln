#
# Marlin Firmware
# Test: rambo/config-08.ini
#
# Rambo | CoreXY, Gradient Mix | Endstop Int. | Home Y > X | FW Retract ...
#

[config:base]
motherboard                              = BOARD_RAMBO
temp_sensor_0                            = -2
digipot_i2c_num_channels                 = 5
lcd_language                             = it
mixing_steppers                          = 2
servo_delay                              = { 300, 300, 300 }
controller_fan_pin                       = X_MAX_PIN
filwidth_pin                             = 5
fan_min_pwm                              = 50
fan_kickstart_time                       = 100
xy_frequency_limit                       = 15
coreyx                                   = on
mixing_extruder                          = on
gradient_mix                             = on
babystepping                             = on
babystep_xy                              = on
babystep_display_total                   = on
filament_lcd_display                     = on
reprap_discount_full_graphic_smart_controller = on
menu_addautostart                        = on
sdsupport                                = on
sdcard_sort_alpha                        = on
endstop_noise_threshold                  = on
fan_soft_pwm                             = on
fix_mounted_probe                        = on
probing_esteppers_off                    = on
probe_offset_wizard                      = on
auto_bed_leveling_bilinear               = on
x_axis_twist_compensation                = on
mesh_edit_menu                           = on
debug_leveling_feature                   = on
g26_mesh_validation                      = on
z_safe_homing                            = on
show_temp_adc_values                     = on
home_y_before_x                          = on
emergency_parser                         = on
sd_abort_on_endstop_hit                  = on
host_action_commands                     = on
host_prompt_support                      = on
host_status_notifications                = on
host_pause_m76                           = on
advanced_ok                              = on
m114_detail                              = on
volumetric_default_on                    = on
no_workspace_offsets                     = on
extra_fan_speed                          = on
fwretract                                = on
use_controller_fan                       = on
controller_fan_editable                  = on
controller_fan_use_z_only                = on
disable_other_extruders                  = off
