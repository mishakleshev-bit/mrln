#
# Marlin Firmware
# Test: rumba32/config-01.ini
#
# RUMBA32 V1.0 with TMC2130, PID Bed, no Bed Thermal Protection
#

[config:base]
motherboard                              = BOARD_RUMBA32_V1_0
serial_port                              = -1
temp_sensor_bed                          = 1
x_driver_type                            = TMC2130
pidtemp                                  = off
pidtempbed                               = on
fan_soft_pwm                             = on
thermal_protection_bed                   = off
