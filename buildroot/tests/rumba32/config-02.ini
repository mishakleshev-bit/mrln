#
# Marlin Firmware
# Test: rumba32/config-02.ini
#
# RUMBA32 V1.1 with TMC2130, TMC2208, PID Bed, EEPROM settings, and graphic LCD controller
#

[config:base]
motherboard                              = BOARD_RUMBA32_V1_1
serial_port                              = -1
temp_sensor_bed                          = 1
x_driver_type                            = TMC2130
y_driver_type                            = TMC2208
pidtempbed                               = on
fan_soft_pwm                             = on
eeprom_settings                          = on
eeprom_chitchat                          = on
reprap_discount_full_graphic_smart_controller = on
