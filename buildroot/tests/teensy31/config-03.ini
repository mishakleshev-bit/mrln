#
# Marlin Firmware
# Test: teensy31/config-03.ini
#
# Teensy3.1 with many features
#

[config:base]
motherboard                              = BOARD_TEENSY31_32
temp_sensor_0                            = 1
temp_sensor_bed                          = 1
i2c_slave_address                        = 63
grid_max_points_x                        = 16
eeprom_settings                          = on
filament_width_sensor                    = on
calibration_gcode                        = on
baud_rate_gcode                          = on
fix_mounted_probe                        = on
z_safe_homing                            = on
auto_bed_leveling_bilinear               = on
debug_leveling_feature                   = on
z_min_probe_repeatability_test           = on
babystepping                             = on
babystep_xy                              = on
babystep_zprobe_offset                   = on
printcounter                             = on
slow_pwm_heaters                         = on
pidtempbed                               = on
inch_mode_support                        = on
temperature_units_support                = on
m100_free_memory_watcher                 = on
nozzle_park_feature                      = on
nozzle_clean_feature                     = on
park_head_on_pause                       = on
arc_support                              = on
bezier_curve_support                     = on
experimental_i2cbus                      = on
extended_capabilities_report             = on
auto_report_temperatures                 = on
photo_gcode                              = on
photo_position                           = on
photo_switch_position                    = on
photo_switch_ms                          = on
photo_delay_ms                           = on
photo_retract_mm                         = on
host_action_commands                     = on
host_prompt_support                      = on
host_status_notifications                = on
