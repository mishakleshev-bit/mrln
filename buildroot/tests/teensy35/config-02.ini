#
# Marlin Firmware
# Test: teensy35/config-02.ini
#
# Teensy3.5 with many features
#

[config:base]
motherboard                              = BOARD_TEENSY35_36
extruders                                = 2
temp_sensor_0                            = 1
temp_sensor_1                            = 5
temp_sensor_bed                          = 1
i2c_slave_address                        = 63
grid_max_points_x                        = 16
nozzle_clean_start_point                 = { { 10, 10, 3 }, { 10, 10, 3 } }
nozzle_clean_end_point                   = { { 10, 20, 3 }, { 10, 20, 3 } }
manual_move_distance_mm                  = 100, 50, 10, 10, 0.1
manual_move_distance_in                  = 1.000, 0.500, 0.100, 0.010, 0.001
sdsort_folders                           = 0
sdsort_uses_ram                          = true
sdsort_cache_names                       = true
sdsort_dynamic_ram                       = true
reprap_discount_full_graphic_smart_controller = on
sdsupport                                = on
sdcard_sort_alpha                        = on
lcd_info_menu                            = on
lcd_printer_info_is_bootscreen           = on
turbo_back_menu_item                     = on
preheat_shortcut_menu_item               = on
filament_width_sensor                    = on
filament_lcd_display                     = on
calibration_gcode                        = on
baud_rate_gcode                          = on
sound_menu_item                          = on
fix_mounted_probe                        = on
z_safe_homing                            = on
auto_bed_leveling_bilinear               = on
z_min_probe_repeatability_test           = on
debug_leveling_feature                   = on
babystepping                             = on
babystep_xy                              = on
babystep_zprobe_offset                   = on
babystep_gfx_overlay                     = on
printcounter                             = on
nozzle_park_feature                      = on
nozzle_clean_feature                     = on
slow_pwm_heaters                         = on
pidtempbed                               = on
eeprom_settings                          = on
inch_mode_support                        = on
temperature_units_support                = on
m100_free_memory_watcher                 = on
advanced_pause_feature                   = on
arc_support                              = on
bezier_curve_support                     = on
experimental_i2cbus                      = on
extended_capabilities_report             = on
auto_report_temperatures                 = on
park_head_on_pause                       = on
photo_gcode                              = on
photo_position                           = on
photo_switch_position                    = on
photo_switch_ms                          = on
photo_delay_ms                           = on
photo_retract_mm                         = on
host_action_commands                     = on
host_prompt_support                      = on
host_status_notifications                = on
