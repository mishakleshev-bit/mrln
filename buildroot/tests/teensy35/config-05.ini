#
# Marlin Firmware
# Test: teensy35/config-05.ini
#
# Mixing Extruder
#

[config:base]
motherboard                              = BOARD_TEENSY35_36
mixing_steppers                          = 2
mixing_extruder                          = on
direct_mixing_in_g1                      = on
gradient_mix                             = on
gradient_vtool                           = on
reprap_discount_full_graphic_smart_controller = on
disable_other_extruders                  = off
