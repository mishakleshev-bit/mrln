[config:base]
motherboard                              = BOARD_TEENSY35_36
x_driver_type                            = TMC5160
y_driver_type                            = TMC5160
x_current_home                           = 750
y_current_home                           = 750
x_min_endstop_hit_state                  = LOW
y_min_endstop_hit_state                  = LOW
x_cs_pin                                 = 46
y_cs_pin                                 = 47
corexy                                   = on
monitor_driver_status                    = on
sensorless_homing                        = on
x_stall_sensitivity                      = on
y_stall_sensitivity                      = on
